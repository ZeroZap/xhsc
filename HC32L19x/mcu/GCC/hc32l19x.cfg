# @file   hc32l19x.cfg
# @brief  OpenOCD configuration file for HC32L19x
#

# Transport selection
transport select swd

# Adapter speed
adapter_khz 1000

# Reset configuration
reset_config srst_only srst_nogate

# Target configuration: HC32L19x (Cortex-M0+)
set _CHIPNAME hc32l19x
set _CPUTAPID 0x0bc11477

# SWD JTAG mode
swd newdap $_CHIPNAME cpu -irlen 2 -ircapture 0x1 -irmask 0x1 -expected-id $_CPUTAPID

# Create target
set _TARGETNAME $_CHIPNAME.cpu
target create $_TARGETNAME cortex_m -chain-position $_TARGETNAME

# Flash configuration
set _FLASHNAME $_CHIPNAME.flash
flash bank $_FLASHNAME hc32l19x 0x00000000 0 0 0 $_TARGETNAME

# GDB port
gdb_port 3333

# Telnet port
telnet_port 4444

# Event handlers
$_TARGETNAME configure -event gdb-attach {
    echo "Halting target"
    reset halt
}

$_TARGETNAME configure -event gdb-detach {
    echo "Resuming target"
    reset run
}
